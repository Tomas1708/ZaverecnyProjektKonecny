{% extends "base.html" %}
{% block title %}Vymazanie poistenia{% endblock %}
{% block content %}
<h2>Zmazať poistenca</h2>
<p>
    Naozaj si prajete zmazať poistenie:
    <strong>{{ object }}</strong>
</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Áno, zmazať</button>
    <a class="btn btn-secondary" href="{% url 'policyholder_detail' object.policyholder.pk %}">Zrušiť</a>
</form>
{% endblock %}
