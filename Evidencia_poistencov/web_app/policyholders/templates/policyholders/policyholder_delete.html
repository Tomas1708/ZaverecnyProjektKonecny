{% extends "base.html" %}

{% block title %}Vymazanie poistenca{% endblock %}
{% block content %}
    <h2>Zmazať poistenca</h2>
<p>
    Naozaj si prajete zmazať poistenca
    <strong>{{ object }}</strong>?
</p>

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">
        Áno, zmazať
    </button>
    <a class="btn btn-secondary" href="{% url 'policyholder_list' %}">
        Zrušiť
    </a>

</form>
{% endblock %}
